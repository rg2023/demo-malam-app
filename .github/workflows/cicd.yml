name: CI/CD Pipeline

on:
  pull_request:
    branches: [dev, main]
    push:
      branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =============================
      # שלב 1 - קביעת גרסה
      # =============================
      - name: Get Version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            VERSION=$(echo "${{ github.event.pull_request.title }}" | grep -oP '\d+\.\d+\.\d+' | head -1)
          fi
          if [ -z "$VERSION" ]; then
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "גרסה: $VERSION"

      # =============================
      # שלב 2 - יצירת Git Tag
      # =============================
      - name: Create Git Tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "v${{ steps.version.outputs.VERSION }}" \
            -m "Release v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      # =============================
      # שלב 3 - התחברות ל-GCP
      # =============================
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
         workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
         service_account: ${{ secrets.GCP_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1

      # =============================
      # שלב 4 - בניית Docker Image
      # =============================
      - name: Build and Push Docker Image
        run: |
          gcloud auth configure-docker me-west1-docker.pkg.dev
          IMAGE="me-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/demo-artifact/demoapp"
          VERSION="v${{ steps.version.outputs.VERSION }}"
          docker build -t $IMAGE:$VERSION -t $IMAGE:latest .
          docker push $IMAGE:$VERSION
          docker push $IMAGE:latest

      # =============================
      # שלב 5 - Deploy
      # =============================
      # - name: Add runner IP to cluster
      #   if: github.event_name == 'push'
      #   run: |
      #     MY_IP=$(curl -s https://api.ipify.org)
      #     gcloud container clusters update demo-cluster \
      #       --region me-west1 \
      #       --enable-master-authorized-networks \
      #       --master-authorized-networks "$MY_IP/32,10.0.0.0/16"
      - name: Connect to cluster
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: demo-cluster
          location: me-west1
          use_dns_based_endpoint: 'true'
          
      - name: Connect to cluster
        if: github.event_name == 'push'
        run: |
          gcloud container clusters get-credentials demo-cluster \
            --region me-west1 \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Install Helm
        if: github.event_name == 'push'
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Deploy to DEV
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        run: |
          helm upgrade --install demoapp ./demoapp \
            --set image.tag=latest

      - name: Deploy to PROD
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          helm upgrade --install demoapp ./demoapp \
            --set image.tag=v${{ steps.version.outputs.VERSION }}